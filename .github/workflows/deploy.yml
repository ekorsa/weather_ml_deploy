name: CI/CD — Build, Push, Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override image tag (leave empty to use git SHA)"
        required: false
        default: ""

env:
  HELM_RELEASE: weather-ml
  HELM_NAMESPACE: weather-ml

jobs:
  # ── Build & push both Docker images to ACR ──────────────────────────────────
  build-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout deploy repo
        uses: actions/checkout@v4

      # Source repo (weather_ml) contains the Dockerfiles and application code.
      # Grant access via a PAT stored in GH_PAT secret if the repo is private.
      - name: Checkout source repo (weather_ml)
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO }}    # e.g. myorg/weather_ml
          token: ${{ secrets.GH_PAT }}
          path: weather_ml_src

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          echo "value=${TAG:-${{ github.sha }}}" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: weather_ml_src
          file: weather_ml_src/Dockerfile.api
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ steps.tag.outputs.value }}
            ${{ secrets.ACR_LOGIN_SERVER }}/api:latest

      - name: Build & push ML image
        uses: docker/build-push-action@v5
        with:
          context: weather_ml_src
          file: weather_ml_src/Dockerfile.ml
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/ml:${{ steps.tag.outputs.value }}
            ${{ secrets.ACR_LOGIN_SERVER }}/ml:latest

  # ── Deploy to AKS via Helm ──────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS via Helm
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout deploy repo
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Bitnami repo & update chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency update helm/weather-ml

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.HELM_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade --install
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/weather-ml \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --values helm/weather-ml/values.yaml \
            --values helm/weather-ml/values-prod.yaml \
            --set image.registry=${{ secrets.ACR_LOGIN_SERVER }} \
            --set api.image.tag=${{ needs.build-push.outputs.image_tag }} \
            --set ml.image.tag=${{ needs.build-push.outputs.image_tag }} \
            --set secrets.postgresPassword=${{ secrets.POSTGRES_PASSWORD }} \
            --set postgresql.auth.password=${{ secrets.POSTGRES_PASSWORD }} \
            --atomic \
            --timeout 10m
